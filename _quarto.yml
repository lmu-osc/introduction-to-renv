project:
  type: website

website:
  title: "Introduction to {renv}"
  page-footer:
    center: © 2026 Pat Callahan. Published by LMU Open Science Center. Licensed under CC BY-SA 4.0.
    border: false
  search:
    location: sidebar
  repo-url: https://github.com/lmu-osc/introduction-to-renv
  repo-actions: [edit, issue]
  back-to-top-navigation: true
  page-navigation: true
  favicon: /assets/lmu-osc-favicon.jpg
  margin-header: |
    ![](//assets/lmu-osc-logo.svg){width="175"}

  navbar:
    right:
      - about.qmd
    left:
      - href: index.qmd
        text: Home
    tools:
      - icon: github
        menu:
          - text: Source Code
            url: https://github.com/lmu-osc/introduction-to-renv
          - text: Report a Bug
            url: https://github.com/lmu-osc/introduction-to-renv/issues
      - icon: house-heart
        url: https://www.osc.lmu.de/

  sidebar:
    style: "docked"
    # background: "#cfc7c6"
    contents:
      - text: "Overview"
        href: index.qmd
      - section: "Background"
        href: background/index.qmd
        contents:
          - href: background/computational-reproducibility.qmd
            text: "1. Reproducibility"
          - href: background/intro-dependencies.qmd
            text: "2. Software Dependencies"
          - href: background/technical-definitions.qmd
            text: "3. Technical Definitions"
          - href: background/dependencies-in-r.qmd
            text: "4. R Package Managers"
      - section: "{renv}"
        href: about-renv/index.qmd
        contents:
          - href: about-renv/renv-getting-started.qmd
            text: "1. Quick Start"
          - href: about-renv/starting-details.qmd
            text: "2. Understanding {renv}"
          - href: about-renv/restoring-a-project.qmd
            text: "3. Restoring Projects"
      - section: "Exercises"
        href: exercises/index.qmd
        contents:
          - href: exercises/example-init-snapshot.qmd
            text: "Init and Snapshot"
          - href: exercises/example-restore.qmd
            text: "Restore"
          - href: exercises/example-explicit-record.qmd
            text: "Explicitly Record"
      - section: "Optional Content"
        href: extra-content/index.qmd
        contents:
          - href: extra-content/caching.qmd
            text: "Caching"
          - href: extra-content/embed-and-use.qmd
            text: "`embed()` and `use()`"
          - href: extra-content/advanced-topics.qmd

format:
  html:
    theme:
      - cosmo
      - lmu-osc-custom.scss
    css:
      - /assets/bootstrap-grid.min.css
      - https://raw.githubusercontent.com/lmu-osc/branding-resources/refs/heads/main/lmu-osc-styles.css
      - footer/footer-style.css
    toc: true
    fontsize: 13pt
    code-overflow: wrap
    code-link: true
    grid:
      sidebar-width: 300px
    include-in-header:
      - file: matomo-analytics.html
    include-after-body:
      - file: footer/footer.html

bibliography: references.bib

editor: source
csl: chicago-fullnote-bibliography.csl
